subscription MatchLive($id: Long!) {
  matchLive(matchId: $id) {
    matchId
    radiantScore
    direScore
    leagueId
    delay
    averageRank
    buildingState
    radiantLead
    lobbyType
    gameTime
    completed
    isUpdating
    isParsing
    radiantTeam {
      id
      name
      countryCode
      url
      logo
      baseLogo
      bannerLogo
    }
    direTeam {
      id
      name
      countryCode
      url
      logo
      baseLogo
      bannerLogo
    }
    players {
      steamAccountId
      steamAccount {
        realName
        name
        seasonRank
        proSteamAccount {
          name
          realName
        }
      }
      heroId
      name
      playerSlot
      isRadiant
      numKills
      numDeaths
      numAssists
      numLastHits
      numDenies
      goldPerMinute
      experiencePerMinute
      level
      gold
      heroDamage
      towerDamage
      itemId0
      itemId1
      itemId2
      itemId3
      itemId4
      itemId5
      backpackId0
      backpackId1
      backpackId2
      playbackData {
        positionEvents {
          time
          x
          y
        }
      }
      networth
      impPerMinute {
        time
        imp
      }
      position
    }
    gameMode
    gameMinute
    createdDateTime
    modifiedDateTime
    winRateValues
    durationValues
    liveWinRateValues {
      time
      winRate
    }
    playbackData {
      buildingEvents {
        indexId
        isAlive
        isRadiant
        npcId
        positionX
        positionY
        time
        type
      }
    }
  }
}
