query MatchLiveHistory($id: Long!) {
  live {
    match(id: $id) {
      playbackData {
        buildingEvents {
          indexId
          isAlive
          isRadiant
          npcId
          positionX
          positionY
          time
          type
        }
        pickBans {
          isPick
          heroId
          order
          bannedHeroId
          isRadiant
        }
      }
      players {
        steamAccountId
        steamAccount {
          realName
          name
          seasonRank
          proSteamAccount {
            name
            realName
          }
        }
        heroId
        name
        playerSlot
        isRadiant
        numKills
        numDeaths
        numAssists
        numLastHits
        numDenies
        goldPerMinute
        experiencePerMinute
        level
        gold
        heroDamage
        towerDamage
        itemId0
        itemId1
        itemId2
        itemId3
        itemId4
        itemId5
        backpackId0
        backpackId1
        backpackId2
        playbackData {
          positionEvents {
            time
            x
            y
          }
          killEvents {
            time
          }
          deathEvents {
            time
          }
          inventoryEvents {
            time
            itemId0
            itemId1
            itemId2
            itemId3
            itemId4
            itemId5
            backpackId0
            backpackId1
            backpackId2
          }
        }
        networth
        position
      }
    }
  }
}

