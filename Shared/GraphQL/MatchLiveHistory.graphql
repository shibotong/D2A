query MatchLiveHistory($id: Long!) {
  live {
    match(id: $id) {
      playbackData {
        buildingEvents {
          indexId
          isAlive
          isRadiant
          npcId
          positionX
          positionY
          time
          type
        }
      }
      players {
        heroId
        playerSlot
        playbackData {
          killEvents {
            time
          }
          deathEvents {
            time
          }
          inventoryEvents {
            time
            itemId0
            itemId1
            itemId2
            itemId3
            itemId4
            itemId5
            backpackId0
            backpackId1
            backpackId2
          }
        }
      }
    }
  }
}

