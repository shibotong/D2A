query Heroes($language: LanguageEnum) {
  constants {
    heroes(language: $language) {
      id
      abilities {
        slot
        abilityId
      }
      roles {
        roleId
        level
      }
      language {
        displayName
        lore
        hype
      }
      talents {
        abilityId
        slot
      }
    }
  }
}
